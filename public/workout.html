<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>FitTrack | Workouts</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        "colors": {
            "on-tertiary": "#005d63",
            "inverse-surface": "#fcf9f8",
            "secondary-dim": "#a533ff",
            "on-tertiary-container": "#005359",
            "surface-container-low": "#131313",
            "error": "#ff6e84",
            "on-primary-fixed": "#000000",
            "surface-container": "#1a1919",
            "surface-variant": "#262626",
            "surface-container-lowest": "#000000",
            "secondary": "#c47fff",
            "on-primary-fixed-variant": "#55004f",
            "tertiary-container": "#00eefc",
            "inverse-primary": "#ad00a1",
            "primary-fixed-dim": "#f93ee6",
            "secondary-container": "#8c00e5",
            "inverse-on-surface": "#565555",
            "on-surface": "#ffffff",
            "secondary-fixed-dim": "#ddb3ff",
            "primary-dim": "#ff57eb",
            "primary": "#ff7eea",
            "on-error-container": "#ffb2b9",
            "surface-container-high": "#201f1f",
            "on-error": "#490013",
            "on-tertiary-fixed": "#003f43",
            "tertiary": "#8ff5ff",
            "surface-dim": "#0e0e0e",
            "outline": "#767575",
            "on-tertiary-fixed-variant": "#005e64",
            "background": "#0e0e0e",
            "on-secondary-fixed-variant": "#7900c6",
            "tertiary-fixed": "#00eefc",
            "on-primary": "#590053",
            "outline-variant": "#484847",
            "on-secondary-container": "#fff5ff",
            "primary-container": "#ff5eeb",
            "surface": "#0e0e0e",
            "on-secondary-fixed": "#500086",
            "error-container": "#a70138",
            "error-dim": "#d73357",
            "tertiary-fixed-dim": "#00deec",
            "on-primary-container": "#450040",
            "surface-tint": "#ff7eea",
            "surface-bright": "#2c2c2c",
            "primary-fixed": "#ff5eeb",
            "on-background": "#ffffff",
            "on-surface-variant": "#adaaaa",
            "secondary-fixed": "#e7c5ff",
            "surface-container-highest": "#262626",
            "tertiary-dim": "#00deec",
            "on-secondary": "#340059"
        },
        "borderRadius": { "DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px" },
        "fontFamily": { "headline": ["Plus Jakarta Sans"], "body": ["Plus Jakarta Sans"], "label": ["Plus Jakarta Sans"] }
      },
    },
  }
</script>
<style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0e0e0e; color: #ffffff; }
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    .glass-panel { background: rgba(26, 25, 25, 0.85); backdrop-filter: blur(24px); }
    @media (max-width: 1024px) {
        aside { position: static; width: 100%; height: auto; }
        main { margin-left: 0 !important; padding: 1.25rem !important; }
    }
    @media (max-width: 768px) {
        header { flex-direction: column; align-items: flex-start !important; gap: 1rem; }
        h2 { font-size: 2rem !important; }
        #workout-grid { grid-template-columns: 1fr !important; gap: 1rem !important; }
        #workout-grid > div { grid-column: span 1 / span 1 !important; }
        .h-\[400px\] { height: 260px !important; }
        .p-10, .p-12 { padding: 1.25rem !important; }
    }
</style>
</head>
<body class="bg-background text-on-background min-h-screen selection:bg-primary/30">
<!-- SideNavBar -->
<aside class="h-screen w-72 fixed left-0 top-0 z-50 bg-[#131313] flex flex-col py-8 border-r border-[#484847]/15">
<div class="px-8 mb-12">
<h1 class="text-xl font-black text-white tracking-tighter">FitTrack</h1>
</div>
<nav class="flex-1 space-y-2">
<a class="flex items-center gap-4 text-[#adaaaa] py-3 px-6 hover:text-white hover:bg-[#1a1919] transition-all font-['Plus_Jakarta_Sans'] uppercase tracking-[0.05em] text-[0.75rem] font-medium" href="/dashboard">
    <span class="material-symbols-outlined">dashboard</span>
    <span>Dashboard</span>
</a>
<!-- Active State: Workouts -->
<a class="flex items-center gap-4 text-[#ff7eea] font-bold py-3 px-6 bg-gradient-to-r from-[#ff7eea]/10 to-transparent border-r-2 border-[#ff7eea] font-['Plus_Jakarta_Sans'] uppercase tracking-[0.05em] text-[0.75rem]" href="/workout">
    <span class="material-symbols-outlined">fitness_center</span>
    <span>Workouts</span>
</a>
<a class="flex items-center gap-4 text-[#adaaaa] py-3 px-6 hover:text-white hover:bg-[#1a1919] transition-all font-['Plus_Jakarta_Sans'] uppercase tracking-[0.05em] text-[0.75rem] font-medium" href="/progress">
    <span class="material-symbols-outlined">insights</span>
    <span>Progress</span>
</a>
<a class="flex items-center gap-4 text-[#adaaaa] py-3 px-6 hover:text-white hover:bg-[#1a1919] transition-all font-['Plus_Jakarta_Sans'] uppercase tracking-[0.05em] text-[0.75rem] font-medium" href="/goals">
    <span class="material-symbols-outlined">emoji_events</span>
    <span>Goals</span>
</a>
<a class="flex items-center gap-4 text-[#adaaaa] py-3 px-6 hover:text-white hover:bg-[#1a1919] transition-all font-['Plus_Jakarta_Sans'] uppercase tracking-[0.05em] text-[0.75rem] font-medium" href="/profile">
    <span class="material-symbols-outlined">person</span>
    <span>Profile</span>
</a>
</nav>
<div class="px-6 mt-auto">
    <button id="sidebar-start-workout-btn" class="w-full bg-gradient-to-br from-[#ff7eea] to-[#c47fff] text-on-primary-fixed font-bold py-4 rounded-full text-sm uppercase tracking-widest shadow-[0_0_20px_rgba(255,126,234,0.3)] transition-transform active:scale-95">
        Start Workout
    </button>
    <div class="mt-8 border-t border-outline-variant/15 pt-6">
    <a class="flex items-center gap-4 text-[#adaaaa] py-3 px-2 hover:text-white transition-all font-['Plus_Jakarta_Sans'] uppercase tracking-[0.05em] text-[0.75rem] font-medium" href="#" id="logout-btn" onclick="event.preventDefault();AuthService.logout()">
        <span class="material-symbols-outlined">logout</span>
        <span>Sign Out</span>
    </a>
    </div>
</div>
</aside>
<!-- Main Content Canvas -->
<main class="ml-72 min-h-screen p-12 bg-surface">
<!-- Header Section -->
<header class="flex justify-between items-end mb-16">
<div class="max-w-2xl">
<h2 class="text-[3.5rem] font-bold leading-none tracking-tight mb-4">Your <span class="text-transparent bg-clip-text bg-gradient-to-br from-primary to-secondary">Momentum</span></h2>
<p class="text-on-surface-variant text-lg leading-relaxed max-w-lg">Track every drop of sweat. Your journey is a series of consistent kinetic choices.</p>
</div>
<button class="group flex items-center gap-3 bg-gradient-to-br from-primary to-secondary px-8 py-4 rounded-full text-on-primary-fixed font-bold hover:brightness-110 transition-all shadow-xl" id="new-workout-btn">
    <span class="material-symbols-outlined">add_circle</span>
    <span class="font-bold uppercase tracking-widest text-sm">Log New Workout</span>
</button>
</header>
<!-- Bento Grid Layout for Workouts -->
<div class="grid grid-cols-12 gap-8" id="workout-grid">
<!-- Default placeholder until JS loads -->
<div class="col-span-12 text-center py-20">
    <span class="material-symbols-outlined text-6xl text-on-surface-variant mb-4 block">fitness_center</span>
    <p class="text-on-surface-variant text-lg">Loading your workouts...</p>
</div>
</div>
</main>

<!-- Workout Modal Backdrop + Dialog -->
<div class="fixed inset-0 z-[100] hidden" id="workout-modal">
    <div class="absolute inset-0 bg-black/60 backdrop-blur-sm"></div>
    <div class="relative flex items-center justify-center min-h-screen px-4">
        <div class="glass-panel w-full max-w-lg rounded-xl p-10 border border-outline-variant/20 shadow-[0_0_50px_rgba(196,127,255,0.15)]">
            <div class="flex justify-between items-center mb-10">
                <h3 class="text-2xl font-bold">Log Activity</h3>
                <button id="close-workout-modal" class="text-on-surface-variant hover:text-white transition-colors p-1 rounded-full hover:bg-surface-container"><span class="material-symbols-outlined">close</span></button>
            </div>
            <form class="space-y-6" id="workout-form">
                <div>
                    <label class="block text-[0.65rem] uppercase font-bold tracking-widest text-on-surface-variant mb-2">Workout Name</label>
                    <input class="w-full bg-surface-container-highest border-none rounded-full px-6 py-4 focus:ring-1 focus:ring-tertiary/40 transition-all text-sm" placeholder="e.g. Morning Sprint" type="text" id="workout-name" required/>
                </div>
                <div>
                    <label class="block text-[0.65rem] uppercase font-bold tracking-widest text-on-surface-variant mb-2">Type</label>
                    <select class="w-full bg-surface-container-highest border-none rounded-full px-6 py-4 focus:ring-1 focus:ring-tertiary/40 transition-all text-sm" id="workout-type">
                        <option value="Strength">Strength</option>
                        <option value="Cardio">Cardio</option>
                        <option value="Yoga">Yoga</option>
                        <option value="Swimming">Swimming</option>
                        <option value="Cycling">Cycling</option>
                    </select>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[0.65rem] uppercase font-bold tracking-widest text-on-surface-variant mb-2">Duration (min)</label>
                        <input class="w-full bg-surface-container-highest border-none rounded-full px-6 py-4 focus:ring-1 focus:ring-tertiary/40 transition-all text-sm" type="number" min="1" id="workout-duration" required/>
                    </div>
                    <div>
                        <label class="block text-[0.65rem] uppercase font-bold tracking-widest text-on-surface-variant mb-2">Calories</label>
                        <input class="w-full bg-surface-container-highest border-none rounded-full px-6 py-4 focus:ring-1 focus:ring-tertiary/40 transition-all text-sm" type="number" min="0" id="workout-calories"/>
                    </div>
                </div>
                <div>
                    <label class="block text-[0.65rem] uppercase font-bold tracking-widest text-on-surface-variant mb-2">Notes</label>
                    <input class="w-full bg-surface-container-highest border-none rounded-full px-6 py-4 focus:ring-1 focus:ring-tertiary/40 transition-all text-sm" placeholder="Optional notes" type="text" id="workout-notes"/>
                </div>
                <p id="workout-form-error" class="text-error text-sm"></p>
                <button class="w-full bg-gradient-to-br from-primary to-secondary text-on-primary-fixed font-bold py-5 rounded-full uppercase tracking-widest text-sm shadow-xl mt-4 hover:brightness-110 transition-all active:scale-95" type="submit" id="workout-submit-btn">Save Session</button>
            </form>
        </div>
    </div>
</div>
<script src="/js/auth.js"></script>
<script src="/js/workouts.js"></script>
</body></html>
