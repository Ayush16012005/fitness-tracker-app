<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<link rel="stylesheet" href="dashboard.css">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans&display=swap" rel="stylesheet">
</head>

<body>

<!-- SIDEBAR -->
<aside class="sidebar">
  <h2>FitTrack</h2>

  <a href="dashboard" class="active">Dashboard</a>
  <a href="workout">Workouts</a>
  <a href="progress">Progress</a>
  <a href="goals">Goals</a>
  <a href="profile">Profile</a>

  <button onclick="location.href='workout'">Start Workout</button>
</aside>

<!-- MAIN -->
<main class="main">

  <header>
    <h1>Welcome back, <span id="username">User</span></h1>
  </header>

  <!-- CARDS -->
  <section class="cards">

    <div class="card">
      <h3>Total Workouts</h3>
      <p id="total-workouts">0</p>
    </div>

    <div class="card">
      <h3>Calories</h3>
      <p id="total-calories">0</p>
    </div>

    <div class="card">
      <h3>Goals</h3>
      <p id="active-goals-count">0</p>
    </div>

    <div class="card highlight">
      <h3>Streak</h3>
      <p id="streak-days">0 Days</p>
    </div>

  </section>

  <!-- CHART -->
  <section class="chart">
    <h2>Weekly Activity</h2>
    <div class="chart-box" id="activity-chart">
      <!-- JS will fill -->
    </div>
  </section>

</main>

<script src="/js/dashboard.js"></script>
<script src="/js/auth.js"></script>

</body>
</html>
